name: Mobidex
options:
  bundleIdPrefix: com.mazdak
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"

packages:
  SwiftASN1:
    url: https://github.com/apple/swift-asn1.git
    exactVersion: "1.4.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    exactVersion: "0.12.1"

targets:
  Mobidex:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Mobidex
    dependencies:
      - sdk: Security.framework
      - package: SwiftASN1
        product: SwiftASN1
      - package: Citadel
        product: Citadel
    info:
      path: Sources/Mobidex/Info.plist
      properties:
        CFBundleDisplayName: Mobidex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mazdak.mobidex
        INFOPLIST_FILE: Sources/Mobidex/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  MobidexTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/MobidexTests
    dependencies:
      - target: Mobidex
    info:
      path: Tests/MobidexTests/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mazdak.mobidex.tests
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  MobidexUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/MobidexUITests
    dependencies:
      - target: Mobidex
    info:
      path: Tests/MobidexUITests/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mazdak.mobidex.uitests
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

schemes:
  Mobidex:
    build:
      targets:
        Mobidex: all
    test:
      targets:
        - MobidexTests
        - MobidexUITests
