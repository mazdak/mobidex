name: Mobidex
options:
  bundleIdPrefix: com.getresq
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

packages:
  SwiftASN1:
    url: https://github.com/apple/swift-asn1.git
    exactVersion: "1.4.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    exactVersion: "0.12.1"
  gitdiff:
    url: https://github.com/tornikegomareli/gitdiff.git
    exactVersion: "0.0.7"

targets:
  Mobidex:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources/Mobidex
    preBuildScripts:
      - name: Build Shared KMP Framework
        script: Scripts/build-shared-framework.sh
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: build/shared-core/MobidexShared.xcframework
        embed: false
      - sdk: Security.framework
      - package: SwiftASN1
        product: SwiftASN1
      - package: Citadel
        product: Citadel
      - package: gitdiff
        product: gitdiff
    info:
      path: Sources/Mobidex/Info.plist
      properties:
        CFBundleDisplayName: Mobidex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getresq.mobidex
        INFOPLIST_FILE: Sources/Mobidex/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Mobidex/Mobidex.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JX3932QCN8
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  MobidexTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/MobidexTests
    dependencies:
      - target: Mobidex
    info:
      path: Tests/MobidexTests/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getresq.mobidex.tests
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

  MobidexUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/MobidexUITests
    dependencies:
      - target: Mobidex
    info:
      path: Tests/MobidexUITests/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.getresq.mobidex.uitests
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"

schemes:
  Mobidex:
    build:
      preActions:
        - name: Build Shared KMP Framework
          script: "$SRCROOT/Scripts/build-shared-framework.sh"
          settingsTarget: Mobidex
      targets:
        Mobidex: all
    test:
      targets:
        - MobidexTests
        - MobidexUITests
